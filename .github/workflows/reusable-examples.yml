name: Reusable Examples Workflow

on:
  workflow_call:
    inputs:
      target-branch:
        description: 'Branch to checkout and test (defaults to the calling branch)'
        required: false
        type: string
        default: ''
      examples-command:
        description: 'Examples command to execute'
        required: false
        type: string
        default: 'cargo check --examples'
      rust-version:
        description: 'Rust version to use for examples'
        required: false
        type: string
        default: 'stable'
jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          repository: DataDog/datadog-api-client-rust
          ref: ${{ inputs.target-branch || github.ref }}
      - name: Install Rust
        run: rustup toolchain install ${{ inputs.rust-version }} --profile minimal --no-self-update && rustup default ${{ inputs.rust-version }}
        shell: bash
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Check examples
        run: ${{ inputs.examples-command }}
        shell: bash