name: Reusable Rust Testing Workflow

on:
  workflow_call:
    inputs:
      target-branch:
        description: 'Branch to checkout and test (defaults to the calling branch)'
        required: false
        type: string
        default: ''
      rust-versions:
        description: 'JSON array of Rust versions to test against'
        required: false
        type: string
        default: '["stable"]'
      platforms:
        description: 'JSON array of platforms to run tests on'
        required: false
        type: string
        default: '["ubuntu-latest"]'

jobs:
  build:
    strategy:
      matrix:
        rust-version: ${{ fromJSON(inputs.rust-versions) }}
        platform: ${{ fromJSON(inputs.platforms) }}
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: DataDog/datadog-api-client-rust
          ref: ${{ inputs.target-branch || github.ref }}
      - name: Install Rust
        id: rust
        run: |
          rustup toolchain install ${{ matrix.rust-version }} --profile minimal --no-self-update && rustup default ${{ matrix.rust-version }}
          echo "version=$(rustc --version | awk '{print $2}')" >> $GITHUB_OUTPUT
        shell: bash
      - name: Cache Cargo registry
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-registry-
      - name: Cache Cargo build
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ steps.rust.outputs.version }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-target-${{ steps.rust.outputs.version }}-
      - name: Compile test binary
        run: cargo test --test main --no-run
        shell: bash
      - name: Stage test binary
        shell: bash
        run: |
          BINARY=$(find target/debug/deps -name 'main-*' -executable -type f | head -1)
          cp "$BINARY" test-binary
      - name: Upload test binary
        uses: actions/upload-artifact@v4
        with:
          name: test-binary-${{ matrix.rust-version }}-${{ matrix.platform }}
          path: test-binary
          retention-days: 1

  test:
    needs: build
    strategy:
      matrix:
        rust-version: ${{ fromJSON(inputs.rust-versions) }}
        platform: ${{ fromJSON(inputs.platforms) }}
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: DataDog/datadog-api-client-rust
          ref: ${{ inputs.target-branch || github.ref }}
      - name: Download test binary
        uses: actions/download-artifact@v4
        with:
          name: test-binary-${{ matrix.rust-version }}-${{ matrix.platform }}
      - name: Run tests
        shell: bash
        run: |
          chmod +x test-binary
          ./test-binary
